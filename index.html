<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>phalanX — Hand Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo">phalanX<span>.dev</span></div>
    <div class="phase-tag">Phase 3 — Joint Angles</div>
    <div class="spacer"></div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status-text">Initializing...</span>
      <span id="hand-count">0 hands</span>
    </div>
  </header>

  <main>

    <!-- LEFT: Camera -->
    <div class="camera-col">
      <div class="camera-wrap" id="cameraWrap">
        <div class="scan-line"></div>
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="spinner"></div>
          <div class="overlay-text" id="overlay-msg">LOADING MEDIAPIPE...</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Controls + Readouts -->
    <div class="right-col">

      <!-- Toggle grid -->
      <div class="toggle-panel">
        <div class="toggle-header">
          <span class="panel-title">JOINTS</span>
          <button class="all-btn" id="allBtn">ALL</button>
          <button class="all-btn" id="noneBtn">NONE</button>
        </div>

        <div class="joint-grid">
          <!-- Header row -->
          <div class="grid-corner"></div>
          <div class="grid-finger-label">THB</div>
          <div class="grid-finger-label">IDX</div>
          <div class="grid-finger-label">MID</div>
          <div class="grid-finger-label">RNG</div>
          <div class="grid-finger-label">PNK</div>

          <!-- MCP row -->
          <div class="grid-joint-label">MCP</div>
          <div class="grid-cell" data-finger="thumb"  data-joint="mcp"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="index"  data-joint="mcp"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="middle" data-joint="mcp"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="ring"   data-joint="mcp"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="pinky"  data-joint="mcp"><div class="cell-inner active"></div></div>

          <!-- PIP row -->
          <div class="grid-joint-label">PIP</div>
          <div class="grid-cell" data-finger="thumb"  data-joint="pip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="index"  data-joint="pip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="middle" data-joint="pip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="ring"   data-joint="pip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="pinky"  data-joint="pip"><div class="cell-inner active"></div></div>

          <!-- DIP row -->
          <div class="grid-joint-label">DIP</div>
          <div class="grid-cell" data-finger="thumb"  data-joint="dip"><div class="cell-inner"></div></div>
          <div class="grid-cell" data-finger="index"  data-joint="dip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="middle" data-joint="dip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="ring"   data-joint="dip"><div class="cell-inner active"></div></div>
          <div class="grid-cell" data-finger="pinky"  data-joint="dip"><div class="cell-inner active"></div></div>
        </div>
      </div>

      <!-- Readout list -->
      <div class="readout-panel" id="readoutPanel">
        <!-- Populated by JS -->
      </div>

    </div>

  </main>

  <footer>PhalanX &mdash; Built with MediaPipe by Google (Apache 2.0)</footer>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>

</body>
</html>
