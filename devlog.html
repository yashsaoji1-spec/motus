<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhalanX — Dev Log</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080c14;
    --surface:  #0e1520;
    --card:     #131c2b;
    --border:   #1e2d45;
    --blue:     #3b82f6;
    --cyan:     #06b6d4;
    --green:    #10b981;
    --amber:    #f59e0b;
    --red:      #ef4444;
    --text:     #e2e8f0;
    --muted:    #4a6080;
    --subtle:   #1e2d45;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    background: rgba(8,12,20,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--blue);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    background: var(--border);
    color: var(--muted);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dev-selector {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .dev-btn {
    padding: 7px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .dev-btn.active-you  { background: var(--blue); color: white; }
  .dev-btn.active-them { background: var(--cyan); color: white; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    min-height: calc(100vh - 64px);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    padding: 32px;
    border-right: 1px solid var(--border);
  }

  .panel-title {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── NEW ENTRY FORM ── */
  .new-entry-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .new-entry-form::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-field label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-field input,
  .form-field select,
  .form-field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-field input:focus,
  .form-field select:focus,
  .form-field textarea:focus {
    border-color: var(--blue);
  }

  .form-field textarea { min-height: 80px; }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .tag-chip {
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag-chip:hover { border-color: var(--blue); color: var(--text); }
  .tag-chip.selected-UI       { background: rgba(59,130,246,0.15); border-color: var(--blue); color: var(--blue); }
  .tag-chip.selected-Backend  { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green); }
  .tag-chip.selected-CV       { background: rgba(245,158,11,0.15); border-color: var(--amber); color: var(--amber); }
  .tag-chip.selected-Bug      { background: rgba(239,68,68,0.15);  border-color: var(--red);   color: var(--red); }
  .tag-chip.selected-Testing  { background: rgba(6,182,212,0.15);  border-color: var(--cyan);  color: var(--cyan); }
  .tag-chip.selected-GitHub   { background: rgba(139,92,246,0.15); border-color: #8b5cf6;      color: #8b5cf6; }

  .submit-row {
    display: flex;
    justify-content: flex-end;
  }

  .submit-btn {
    padding: 10px 24px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: #2563eb; }

  /* ── ENTRIES ── */
  .entries-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    position: relative;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-card:hover { border-color: #2a3d5a; }

  .entry-card.dev-you  { border-left: 3px solid var(--blue); }
  .entry-card.dev-them { border-left: 3px solid var(--cyan); }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .entry-dev {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .entry-dev.you  { background: rgba(59,130,246,0.15); color: var(--blue); }
  .entry-dev.them { background: rgba(6,182,212,0.15);  color: var(--cyan); }

  .entry-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .entry-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .entry-tag {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-UI       { background: rgba(59,130,246,0.15); color: var(--blue); }
  .tag-Backend  { background: rgba(16,185,129,0.15); color: var(--green); }
  .tag-CV       { background: rgba(245,158,11,0.15); color: var(--amber); }
  .tag-Bug      { background: rgba(239,68,68,0.15);  color: var(--red); }
  .tag-Testing  { background: rgba(6,182,212,0.15);  color: var(--cyan); }
  .tag-GitHub   { background: rgba(139,92,246,0.15); color: #8b5cf6; }

  .entry-actions {
    display: flex;
    gap: 6px;
  }

  .entry-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
  }

  .entry-delete:hover { color: var(--red); background: rgba(239,68,68,0.1); }

  .entry-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .entry-body {
    font-size: 0.85rem;
    color: #7a95b8;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .entry-blockers {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 6px;
    font-size: 0.8rem;
    color: #f87171;
    line-height: 1.5;
  }

  .entry-blockers strong {
    display: block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
    color: var(--red);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.8;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }

  .empty-state .empty-icon {
    font-size: 2rem;
    margin-bottom: 12px;
    display: block;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Activity by dev */
  .dev-bar-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .dev-bar-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dev-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
  }

  .dev-bar-name { font-weight: 700; }
  .dev-bar-count { color: var(--muted); font-family: 'Space Mono', monospace; }

  .dev-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .dev-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Tag breakdown */
  .tag-breakdown {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tag-row-stat {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag-row-name {
    width: 70px;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .tag-row-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .tag-row-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .tag-row-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    width: 20px;
    text-align: right;
  }

  /* Recent days heatmap */
  .heatmap {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .heatmap-day {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    cursor: default;
    transition: background 0.2s;
    position: relative;
  }

  .heatmap-day.has-entries-1 { background: rgba(59,130,246,0.25); color: #93c5fd; }
  .heatmap-day.has-entries-2 { background: rgba(59,130,246,0.45); color: #bfdbfe; }
  .heatmap-day.has-entries-3 { background: rgba(59,130,246,0.7);  color: white; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--blue); color: var(--text); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

  /* Search */
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--muted); }

  select option { background: #0e1520; }

  .section-divider {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      PhalanX
      <span class="logo-badge">DEV LOG</span>
    </div>
    <div class="header-right">
      <div class="dev-selector">
        <button class="dev-btn active-you" id="btnYou"  onclick="setActiveDev('you')">You</button>
        <button class="dev-btn"            id="btnThem" onclick="setActiveDev('them')">Partner</button>
      </div>
    </div>
  </header>

  <div class="main">

    <!-- LEFT: ENTRIES -->
    <div class="left-panel">

      <!-- NEW ENTRY FORM -->
      <div class="new-entry-form">
        <div class="form-row">
          <div class="form-field">
            <label>Date</label>
            <input type="date" id="entryDate" />
          </div>
          <div class="form-field">
            <label>Logging as</label>
            <select id="entryDev">
              <option value="you">You</option>
              <option value="them">Partner</option>
            </select>
          </div>
        </div>

        <div class="form-field" style="margin-bottom:12px;">
          <label>What did you work on?</label>
          <input type="text" id="entryTitle" placeholder="e.g. Built the forgot password screen" />
        </div>

        <div class="form-field" style="margin-bottom:12px;">
          <label>Details (optional)</label>
          <textarea id="entryBody" placeholder="Any extra context, decisions made, things learned..."></textarea>
        </div>

        <div class="form-field" style="margin-bottom:12px;">
          <label>Blockers / Issues (optional)</label>
          <input type="text" id="entryBlockers" placeholder="e.g. Camera still denied on Android Chrome" />
        </div>

        <div class="form-field" style="margin-bottom:12px;">
          <label>Tags</label>
          <div class="tag-row" id="tagRow">
            <button class="tag-chip" data-tag="UI"      onclick="toggleTag(this)">UI</button>
            <button class="tag-chip" data-tag="Backend" onclick="toggleTag(this)">Backend</button>
            <button class="tag-chip" data-tag="CV"      onclick="toggleTag(this)">CV / Tracking</button>
            <button class="tag-chip" data-tag="Bug"     onclick="toggleTag(this)">Bug Fix</button>
            <button class="tag-chip" data-tag="Testing" onclick="toggleTag(this)">Testing</button>
            <button class="tag-chip" data-tag="GitHub"  onclick="toggleTag(this)">GitHub</button>
          </div>
        </div>

        <div class="submit-row">
          <button class="submit-btn" onclick="addEntry()">Log Entry</button>
        </div>
      </div>

      <!-- FILTER + SEARCH -->
      <input class="search-input" id="searchInput" placeholder="Search entries..." oninput="renderEntries()" />
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all"     onclick="setFilter(this)">All</button>
        <button class="filter-btn"        data-filter="you"     onclick="setFilter(this)">You</button>
        <button class="filter-btn"        data-filter="them"    onclick="setFilter(this)">Partner</button>
        <button class="filter-btn"        data-filter="UI"      onclick="setFilter(this)">UI</button>
        <button class="filter-btn"        data-filter="Backend" onclick="setFilter(this)">Backend</button>
        <button class="filter-btn"        data-filter="CV"      onclick="setFilter(this)">CV</button>
        <button class="filter-btn"        data-filter="Bug"     onclick="setFilter(this)">Bug Fix</button>
      </div>

      <p class="panel-title" style="margin-top:16px;">Entries</p>
      <div class="entries-list" id="entriesList"></div>
    </div>

    <!-- RIGHT: STATS -->
    <div class="right-panel">

      <p class="panel-title">Overview</p>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-value" id="statTotal" style="color:var(--blue)">0</div>
          <div class="stat-label">Total Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statDays" style="color:var(--cyan)">0</div>
          <div class="stat-label">Days Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statYou" style="color:var(--blue)">0</div>
          <div class="stat-label">Your Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statThem" style="color:var(--cyan)">0</div>
          <div class="stat-label">Partner Entries</div>
        </div>
      </div>

      <div>
        <p class="section-divider">Contribution</p>
        <div class="dev-bar-row" id="devBars"></div>
      </div>

      <div>
        <p class="section-divider">By Category</p>
        <div class="tag-breakdown" id="tagBreakdown"></div>
      </div>

      <div>
        <p class="section-divider">Last 28 Days</p>
        <div class="heatmap" id="heatmap"></div>
      </div>

      <div>
        <p class="section-divider">Blockers</p>
        <div id="blockersList" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── STATE ──────────────────────────────────────────────────────────

  let activeDev  = 'you';
  let activeFilter = 'all';
  let selectedTags = new Set();

  const STORAGE_KEY = 'phalanx_devlog';

  function getEntries() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  // ── INIT ───────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('entryDate').value = todayStr();
    renderAll();
  });

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function formatDate(str) {
    const d = new Date(str + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  }

  // ── DEV TOGGLE ────────────────────────────────────────────────────

  function setActiveDev(dev) {
    activeDev = dev;
    document.getElementById('btnYou').className  = 'dev-btn' + (dev === 'you'  ? ' active-you'  : '');
    document.getElementById('btnThem').className = 'dev-btn' + (dev === 'them' ? ' active-them' : '');
    document.getElementById('entryDev').value = dev;
  }

  // ── TAGS ──────────────────────────────────────────────────────────

  function toggleTag(btn) {
    const tag = btn.dataset.tag;
    if (selectedTags.has(tag)) {
      selectedTags.delete(tag);
      btn.className = 'tag-chip';
    } else {
      selectedTags.add(tag);
      btn.className = `tag-chip selected-${tag}`;
    }
  }

  function clearTags() {
    selectedTags.clear();
    document.querySelectorAll('.tag-chip').forEach(b => b.className = 'tag-chip');
  }

  // ── FILTER ────────────────────────────────────────────────────────

  function setFilter(btn) {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEntries();
  }

  // ── ADD ENTRY ─────────────────────────────────────────────────────

  function addEntry() {
    const title    = document.getElementById('entryTitle').value.trim();
    const date     = document.getElementById('entryDate').value;
    const dev      = document.getElementById('entryDev').value;
    const body     = document.getElementById('entryBody').value.trim();
    const blockers = document.getElementById('entryBlockers').value.trim();

    if (!title) {
      document.getElementById('entryTitle').style.borderColor = 'var(--red)';
      setTimeout(() => document.getElementById('entryTitle').style.borderColor = '', 1500);
      return;
    }
    if (!date) { alert('Please select a date.'); return; }

    const entry = {
      id:       Date.now(),
      date,
      dev,
      title,
      body,
      blockers,
      tags: [...selectedTags]
    };

    const entries = getEntries();
    entries.unshift(entry);
    saveEntries(entries);

    // Reset form
    document.getElementById('entryTitle').value    = '';
    document.getElementById('entryBody').value     = '';
    document.getElementById('entryBlockers').value = '';
    clearTags();

    renderAll();
  }

  // ── DELETE ────────────────────────────────────────────────────────

  function deleteEntry(id) {
    const entries = getEntries().filter(e => e.id !== id);
    saveEntries(entries);
    renderAll();
  }

  // ── RENDER ENTRIES ────────────────────────────────────────────────

  function renderEntries() {
    const search   = document.getElementById('searchInput').value.toLowerCase();
    let   entries  = getEntries();

    // Filter
    if (activeFilter !== 'all') {
      if (activeFilter === 'you' || activeFilter === 'them') {
        entries = entries.filter(e => e.dev === activeFilter);
      } else {
        entries = entries.filter(e => e.tags && e.tags.includes(activeFilter));
      }
    }

    // Search
    if (search) {
      entries = entries.filter(e =>
        e.title.toLowerCase().includes(search) ||
        (e.body     && e.body.toLowerCase().includes(search)) ||
        (e.blockers && e.blockers.toLowerCase().includes(search))
      );
    }

    const list = document.getElementById('entriesList');

    if (entries.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📋</span>
          ${search || activeFilter !== 'all'
            ? 'No entries match your filter.'
            : 'No entries yet.<br/>Log your first work session above.'}
        </div>`;
      return;
    }

    // Group by date
    const grouped = {};
    entries.forEach(e => {
      if (!grouped[e.date]) grouped[e.date] = [];
      grouped[e.date].push(e);
    });

    list.innerHTML = Object.keys(grouped)
      .sort((a,b) => b.localeCompare(a))
      .map(date => `
        <div style="margin-bottom:4px;">
          <div style="font-size:0.7rem;font-family:'Space Mono',monospace;color:var(--muted);
                      margin-bottom:8px;padding-left:4px;">
            ${formatDate(date)}
          </div>
          ${grouped[date].map(entry => renderEntryCard(entry)).join('')}
        </div>
      `).join('');
  }

  function renderEntryCard(entry) {
    const tagsHTML = (entry.tags || []).map(t =>
      `<span class="entry-tag tag-${t}">${t}</span>`
    ).join('');

    return `
      <div class="entry-card dev-${entry.dev}" style="margin-bottom:10px;">
        <div class="entry-header">
          <div class="entry-meta">
            <span class="entry-dev ${entry.dev}">${entry.dev === 'you' ? 'You' : 'Partner'}</span>
            ${tagsHTML}
          </div>
          <div class="entry-actions">
            <button class="entry-delete" onclick="deleteEntry(${entry.id})">✕</button>
          </div>
        </div>
        <div class="entry-title">${entry.title}</div>
        ${entry.body ? `<div class="entry-body">${entry.body}</div>` : ''}
        ${entry.blockers ? `
          <div class="entry-blockers">
            <strong>Blocker</strong>
            ${entry.blockers}
          </div>` : ''}
      </div>
    `;
  }

  // ── RENDER STATS ──────────────────────────────────────────────────

  function renderStats() {
    const entries = getEntries();
    const youCount  = entries.filter(e => e.dev === 'you').length;
    const themCount = entries.filter(e => e.dev === 'them').length;
    const days = new Set(entries.map(e => e.date)).size;

    document.getElementById('statTotal').textContent = entries.length;
    document.getElementById('statDays').textContent  = days;
    document.getElementById('statYou').textContent   = youCount;
    document.getElementById('statThem').textContent  = themCount;

    // Dev bars
    const total = entries.length || 1;
    document.getElementById('devBars').innerHTML = `
      <div class="dev-bar-item">
        <div class="dev-bar-label">
          <span class="dev-bar-name" style="color:var(--blue)">You</span>
          <span class="dev-bar-count">${youCount} entries</span>
        </div>
        <div class="dev-bar-track">
          <div class="dev-bar-fill" style="width:${(youCount/total)*100}%;background:var(--blue)"></div>
        </div>
      </div>
      <div class="dev-bar-item">
        <div class="dev-bar-label">
          <span class="dev-bar-name" style="color:var(--cyan)">Partner</span>
          <span class="dev-bar-count">${themCount} entries</span>
        </div>
        <div class="dev-bar-track">
          <div class="dev-bar-fill" style="width:${(themCount/total)*100}%;background:var(--cyan)"></div>
        </div>
      </div>
    `;

    // Tag breakdown
    const tagColors = {
      UI: 'var(--blue)', Backend: 'var(--green)', CV: 'var(--amber)',
      Bug: 'var(--red)', Testing: 'var(--cyan)', GitHub: '#8b5cf6'
    };

    const tagCounts = {};
    entries.forEach(e => (e.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
    const maxTag = Math.max(...Object.values(tagCounts), 1);

    document.getElementById('tagBreakdown').innerHTML =
      Object.entries(tagCounts)
        .sort((a,b) => b[1]-a[1])
        .map(([tag, count]) => `
          <div class="tag-row-stat">
            <span class="tag-row-name entry-tag tag-${tag}">${tag}</span>
            <div class="tag-row-bar">
              <div class="tag-row-fill" style="width:${(count/maxTag)*100}%;background:${tagColors[tag]||'var(--blue)'}"></div>
            </div>
            <span class="tag-row-count">${count}</span>
          </div>
        `).join('') || '<span style="color:var(--muted);font-size:0.8rem;">No tags yet</span>';

    // Heatmap — last 28 days
    const heatmap = document.getElementById('heatmap');
    const dayCounts = {};
    entries.forEach(e => { dayCounts[e.date] = (dayCounts[e.date]||0)+1; });

    const days28 = [];
    for (let i = 27; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days28.push(d.toISOString().split('T')[0]);
    }

    heatmap.innerHTML = days28.map(d => {
      const count = dayCounts[d] || 0;
      const level = count === 0 ? 0 : count === 1 ? 1 : count <= 3 ? 2 : 3;
      const day   = new Date(d + 'T12:00:00').getDate();
      return `<div class="heatmap-day has-entries-${level}" title="${d}: ${count} entries">${day}</div>`;
    }).join('');

    // Blockers
    const blockers = entries.filter(e => e.blockers);
    document.getElementById('blockersList').innerHTML =
      blockers.length === 0
        ? '<span style="color:var(--muted);font-size:0.8rem;">No blockers logged 🎉</span>'
        : blockers.slice(0,5).map(e => `
            <div style="padding:8px 12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);
                        border-radius:6px;font-size:0.78rem;color:#f87171;line-height:1.4;">
              <span style="font-size:0.65rem;color:var(--muted);display:block;margin-bottom:2px;
                           font-family:'Space Mono',monospace;">${formatDate(e.date)}</span>
              ${e.blockers}
            </div>
          `).join('');
  }

  // ── RENDER ALL ────────────────────────────────────────────────────

  function renderAll() {
    renderEntries();
    renderStats();
  }
</script>
</body>
</html>
