name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      # Uncomment when item 13 (Firebase rules tests) is done:
      # - run: npm run test:rules
      # Uncomment when ESLint is configured:
      # - run: npx eslint code/app.js --max-warnings 0
